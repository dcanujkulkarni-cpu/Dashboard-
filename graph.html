
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Decanter Trend Panel</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1220;
color:white;
}
header{
background:#111827;
padding:20px;
text-align:center;
font-size:30px;
font-weight:700;
border-bottom:2px solid #1e293b;
}
.topbar{
display:flex;
gap:15px;
padding:20px;
background:#111827;
align-items:center;
flex-wrap:wrap;
}
input,select,button{
padding:10px 14px;
border-radius:8px;
border:none;
font-size:14px;
}
select,input{
background:#1e293b;
color:white;
}
button{
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}
button:hover{background:#1d4ed8;}
.panel{
margin:25px;
background:#111827;
padding:25px;
border-radius:15px;
border:1px solid #334155;
}
.graph{
height:650px;
background:white;
border-radius:10px;
}
.controlRow{
display:flex;
flex-wrap:wrap;
gap:12px;
margin-bottom:18px;
align-items:center;
}
.metric{
background:#1e293b;
padding:14px;
border-radius:10px;
margin-top:18px;
line-height:1.7;
}
.liveBadge{
margin-left:auto;
font-weight:700;
color:#22c55e;
}
</style>
</head>
<body>

<header>
📈 Decanter Analytics Graph Panel
</header>

<div class="topbar">
<label>Date:</label>
<input type="date" id="datePick">
<button onclick="loadSheetData()">Load Data</button>
<button onclick="startLive()">▶ Start Live</button>
<button onclick="stopLive()">⏸ Stop Live</button>

<input type="file" id="fileInput" accept=".csv">
<button onclick="loadCSV()">Upload CSV</button>

<span class="liveBadge" id="liveStatus">Idle</span>
</div>

<div class="panel">
<h2>⚙ Basin 1</h2>

<div class="controlRow">
<label>X Axis</label>
<select id="c1x">
<option value="Timestamp">Timestamp</option>
</select>

<label>Y1</label>
<select id="c1y1"></select>

<label>Y2</label>
<select id="c1y2"></select>

<label>Y3</label>
<select id="c1y3"></select>

<label>Fit</label>
<select id="fit1">
<option>Raw Trend</option>
<option>Ridge/Lasso Fit</option>
<option>Both</option>
</select>

<button onclick="plotC1()">Plot Basin 1</button>
</div>

<div id="graph1" class="graph"></div>
<div id="stats1" class="metric"></div>
</div>

<div class="panel">
<h2>⚙ Basin 2</h2>

<div class="controlRow">
<label>X Axis</label>
<select id="c2x">
<option value="Timestamp">Timestamp</option>
</select>

<label>Y1</label>
<select id="c2y1"></select>

<label>Y2</label>
<select id="c2y2"></select>

<label>Y3</label>
<select id="c2y3"></select>

<label>Fit</label>
<select id="fit2">
<option>Raw Trend</option>
<option>Ridge/Lasso Fit</option>
<option>Both</option>
</select>

<button onclick="plotC2()">Plot Basin 2</button>
</div>

<div id="graph2" class="graph"></div>
<div id="stats2" class="metric"></div>
</div>

<script>
const BASE_URL="https://script.google.com/macros/s/AKfycbw5UXnwLXehPLf8ots1zp4aYrkIFYOlM1SMddbzUUjrzviynH4ogyKL0RdeRhd7SBZ3/exec";
let fullData=[];
let liveTimer=null;

const c1Fields=[
"NONE",
"C1_Level",
"C1_Inflow",
"C1_CycleTot",
"C1_CycleRem",
"C1_SetRPM",
"C1_ActRPM",
"C1_Current_A",
"C1_Power_kW",
"C1_Torque_Nm",
"C1_Freq_Hz"
];

const c2Fields=[
"NONE",
"C2_Level",
"C2_Inflow",
"C2_CycleTot",
"C2_CycleRem",
"C2_SetRPM",
"C2_ActRPM",
"C2_Current_A",
"C2_Power_kW",
"C2_Torque_Nm",
"C2_Freq_Hz"
];

function fillDropdown(id,arr,def){
let d=document.getElementById(id);
arr.forEach(v=>d.add(new Option(v,v)));
d.value=def;
}

fillDropdown('c1y1',c1Fields,'C1_Level');
fillDropdown('c1y2',c1Fields,'C1_Power_kW');
fillDropdown('c1y3',c1Fields,'NONE');
fillDropdown('c2y1',c2Fields,'C2_Level');
fillDropdown('c2y2',c2Fields,'C2_Power_kW');
fillDropdown('c2y3',c2Fields,'NONE');

function todayDefault(){
let d=new Date();
document.getElementById('datePick').value=
d.toISOString().split('T')[0];
}
todayDefault();

function selectedIsToday(){
let d=new Date().toISOString().split('T')[0];
return document.getElementById('datePick').value===d;
}

async function loadSheetData(){
try{
let date=document.getElementById('datePick').value;
let url=BASE_URL+"?date="+date+"&history=1&t="+Date.now();
let r=await fetch(url,{method:'GET',cache:'no-store'});
let data=await r.json();

if(data.rows){
fullData=data.rows;
document.getElementById('liveStatus').innerHTML=
selectedIsToday()?"🟢 LIVE STREAMING (5s refresh)":"Loaded "+fullData.length;

if(selectedIsToday()){
startLive();
}else{
stopLive();
}

plotC1();
plotC2();
}else{
alert('No rows returned');
}
}catch(e){
console.error(e); alert('Fetch error fixed version: check deployment access=Anyone. Code now uses no-cache and tolerant parsing.');
}
}

function startLive(){
stopLive();
liveTimer=setInterval(async()=>{
await loadSheetDataSilent();
plotC1();
plotC2();
},5000);
}

function stopLive(){
if(liveTimer) clearInterval(liveTimer);
}

async function loadSheetDataSilent(){
let date=document.getElementById('datePick').value;
let url=BASE_URL+"?date="+date+"&history=1&t="+Date.now();
let r=await fetch(url,{method:'GET',cache:'no-store'});
let d=await r.json();
if(d.rows) fullData=d.rows;
}

function loadCSV(){
let file=document.getElementById('fileInput').files[0];
if(!file) return;
stopLive();
let reader=new FileReader();
reader.onload=function(e){
let lines=e.target.result.trim().split(/\r?\n/);
let headers=lines[0].split(',');
fullData=[];
for(let i=1;i<lines.length;i++){
let vals=lines[i].split(',');
let obj={};
headers.forEach((h,j)=>obj[h.trim()]=vals[j]);
fullData.push(obj);
}
plotC1();
plotC2();
};
reader.readAsText(file);
}

function linearFit(y){
let n=y.length;
let sx=0,sy=0,sxy=0,sxx=0;
for(let i=0;i<n;i++){
sx+=i;
sy+=y[i];
sxy+=i*y[i];
sxx+=i*i;
}
let m=(n*sxy-sx*sy)/(n*sxx-sx*sx||1);
let b=(sy-m*sx)/n;
let fit=[];
for(let i=0;i<n;i++) fit.push(m*i+b);

let mean=sy/n;
let ssTot=0,ssRes=0;
for(let i=0;i<n;i++){
ssTot+=(y[i]-mean)**2;
ssRes+=(y[i]-fit[i])**2;
}
let r2=1-ssRes/(ssTot||1);
return {fit,m,b,r2};
}

function plotC1(){
plotMulti(
'graph1',
['c1y1','c1y2','c1y3'],
'fit1',
'Basin 1',
'stats1'
);
}

function plotC2(){
plotMulti(
'graph2',
['c2y1','c2y2','c2y3'],
'fit2',
'Basin 2',
'stats2'
);
}

function plotMulti(div,selectIds,fitId,title,statsDiv){
if(!fullData.length){
alert('Load data first');
return;
}

let timestamps=fullData.map(r=>String(r.Timestamp||r.Time||''));
let traces=[];
let stats='';

selectIds.forEach(id=>{
let field=document.getElementById(id).value;
if(field==='NONE') return;

let y=fullData.map(r=>{
let v=parseFloat(r[field])||0;
if(field.includes('Freq')||field.includes('Torque')||field.includes('ActRPM')){
v=Math.abs(v); // invert negatives to positive for plotting
}
if(field.includes('Level')) v=v/1000; // mm to m
return v;
});
let mode=document.getElementById(fitId).value;

if(mode==='Raw Trend' || mode==='Both'){
traces.push({
x:timestamps,
y:y,
mode:'lines',
name:field
});
}

if(mode==='Ridge/Lasso Fit' || mode==='Both'){
let reg=linearFit(y);
traces.push({
x:timestamps,
y:reg.fit,
mode:'lines',
name:field+' Ridge/Lasso Fit',
line:{dash:'dash'}
});
stats+=`${field} → slope=${reg.m.toFixed(4)} intercept=${reg.b.toFixed(3)} R²=${reg.r2.toFixed(4)}<br>`;
}
});

Plotly.newPlot(
div,
traces,
{
title:title,
template:'plotly_dark',
hovermode:'x unified',
xaxis:{
title:'Timestamp',
type:'category',
tickangle:-35,
automargin:true
},
yaxis:{title:'Parameter'},
legend:{orientation:'h'}
},
{responsive:true}
);

document.getElementById(statsDiv).innerHTML=
stats || 'Raw trend mode selected.';
}

loadSheetData();
setInterval(()=>{
if(selectedIsToday()){
loadSheetDataSilent().then(()=>{plotC1();plotC2();});
}
},5000);
</script>

</body>
</html>
