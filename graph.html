
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Decanter Analytics Panel</title>
<script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
<style>
body{
margin:0;
font-family:Segoe UI;
background:#0b1220;
color:#fff;
}
header{
background:#111827;
padding:22px;
text-align:center;
font-size:30px;
font-weight:700;
border-bottom:2px solid #1e293b;
}
.topbar{
display:flex;
flex-wrap:wrap;
gap:14px;
padding:18px;
background:#111827;
align-items:center;
}
input,select,button{
padding:10px 14px;
border-radius:8px;
border:none;
font-size:14px;
}
select,input{
background:#1e293b;
color:#fff;
}
button{
background:#2563eb;
color:white;
font-weight:700;
cursor:pointer;
}
button:hover{background:#1d4ed8}
.panel{
margin:24px;
background:#111827;
padding:24px;
border-radius:16px;
border:1px solid #334155;
}
.controlRow{
display:flex;
flex-wrap:wrap;
gap:14px;
margin-bottom:18px;
align-items:center;
}
.graph{
height:560px;
background:#fff;
border-radius:10px;
}
.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:16px;
margin:20px 24px;
}
.card{
background:#111827;
padding:18px;
border-radius:14px;
border:1px solid #334155;
}
.card h3{margin-bottom:10px;color:#60a5fa}
.metric{
font-family:Consolas;
line-height:1.8;
font-size:14px;
}
.badge{
background:#1e3a8a;
padding:5px 10px;
border-radius:8px;
}
</style>
</head>
<body>

<header>
📈 Decanter Advanced Trend & Regression Analytics
</header>

<div class="topbar">
<label>Date</label>
<input type="date" id="datePick">

<button onclick="loadSheetData()">
Load Sheet Data
</button>

<label>Analysis</label>
<select id="analysisMode">
<option value="raw">Raw Trend</option>
<option value="ridge">Ridge Fit</option>
<option value="lasso">Lasso Fit</option>
<option value="all" selected>Compare All</option>
</select>

<div style="margin-left:auto">
<input type="file" id="fileInput" accept=".csv">
<button onclick="loadCSV()">Upload CSV</button>
</div>
</div>

<div class="stats">
<div class="card">
<h3>Basin 1 Regression</h3>
<div class="metric" id="stats1">Awaiting plot...</div>
</div>

<div class="card">
<h3>Basin 2 Regression</h3>
<div class="metric" id="stats2">Awaiting plot...</div>
</div>
</div>

<div class="panel">
<h2>⚙ Basin 1 Analytics</h2>
<div class="controlRow">
<label>X</label>
<select id="c1x"></select>
<label>Y</label>
<select id="c1y"></select>
<button onclick="plotC1()">Plot Basin 1</button>
</div>
<div id="graph1" class="graph"></div>
</div>

<div class="panel">
<h2>⚙ Basin 2 Analytics</h2>
<div class="controlRow">
<label>X</label>
<select id="c2x"></select>
<label>Y</label>
<select id="c2y"></select>
<button onclick="plotC2()">Plot Basin 2</button>
</div>
<div id="graph2" class="graph"></div>
</div>

<script>
const BASE_URL=
"https://script.google.com/macros/s/AKfycbw5UXnwLXehPLf8ots1zp4aYrkIFYOlM1SMddbzUUjrzviynH4ogyKL0RdeRhd7SBZ3/exec";

let fullData=[];
let liveTimer=null;

const fields=[
"Timestamp",
"C1_Level",
"C1_Inflow",
"C1_CycleTot",
"C1_CycleRem",
"C1_SetRPM",
"C1_ActRPM",
"C1_Current_A",
"C1_Power_kW",
"C1_Torque_Nm",
"C1_Freq_Hz",
"C2_Level",
"C2_Inflow",
"C2_CycleTot",
"C2_CycleRem",
"C2_SetRPM",
"C2_ActRPM",
"C2_Current_A",
"C2_Power_kW",
"C2_Torque_Nm",
"C2_Freq_Hz"
];

function fillDropdowns(){
fields.forEach(f=>{
if(f.startsWith("C1")||f=="Timestamp"){
c1x.add(new Option(f,f));
c1y.add(new Option(f,f));
}
if(f.startsWith("C2")||f=="Timestamp"){
c2x.add(new Option(f,f));
c2y.add(new Option(f,f));
}
});

c1x.value="Timestamp";
c2x.value="Timestamp";
c1y.value="C1_Level";
c2y.value="C2_Level";
}
fillDropdowns();

function todayDefault(){
let d=new Date();
datePick.value=d.toISOString().split('T')[0];
}
todayDefault();

async function loadSheetData(){
let date=datePick.value;
let url=BASE_URL+"?date="+date+"&history=1&t="+Date.now();
try{
let r=await fetch(url);
let data=await r.json();
if(data.rows){
fullData=data.rows;
alert("Loaded "+fullData.length+" samples");
setupLiveIfToday();
}
else alert("No rows returned");
}
catch(e){
alert("Fetch error");
console.log(e);
}
}

function setupLiveIfToday(){
if(liveTimer) clearInterval(liveTimer);
let today=(new Date()).toISOString().split('T')[0];
if(datePick.value===today){
liveTimer=setInterval(async()=>{
await loadSheetDataSilent();
},30000);
}
}

async function loadSheetDataSilent(){
let url=BASE_URL+"?date="+datePick.value+"&history=1&t="+Date.now();
let r=await fetch(url);
let data=await r.json();
if(data.rows){
fullData=data.rows;
}
}

function loadCSV(){
let file=fileInput.files[0];
if(!file)return;
let reader=new FileReader();
reader.onload=function(e){
let lines=e.target.result.trim().split(/\r?\n/);
let headers=lines[0].split(',');
fullData=[];
for(let i=1;i<lines.length;i++){
let vals=lines[i].split(',');
let obj={};
headers.forEach((h,j)=>obj[h.trim()]=vals[j]);
fullData.push(obj);
}
alert("CSV loaded: "+fullData.length+" rows");
};
reader.readAsText(file);
}

function numericSeries(field){
return fullData
.map(r=>parseFloat(r[field]))
.filter(v=>!isNaN(v));
}

function seq(n){
return Array.from({length:n},(_,i)=>i+1);
}

function mean(a){
return a.reduce((s,v)=>s+v,0)/a.length;
}

function r2(y,p){
let ym=mean(y);
let ssr=0,sst=0;
for(let i=0;i<y.length;i++){
ssr+=(y[i]-p[i])**2;
sst+=(y[i]-ym)**2;
}
return 1-ssr/sst;
}

function ridgeFit(x,y,lambda=5){
let n=x.length;
let sx=x.reduce((a,b)=>a+b,0);
let sy=y.reduce((a,b)=>a+b,0);
let sxy=0,sxx=0;
for(let i=0;i<n;i++){
sxy+=x[i]*y[i];
sxx+=x[i]*x[i];
}
let slope=(n*sxy-sx*sy)/(n*sxx-sx*sx+lambda);
let intercept=(sy-slope*sx)/n;
let pred=x.map(v=>intercept+slope*v);
return{
intercept,slope,pred,
r2:r2(y,pred)
};
}

function softThreshold(z,g){
if(z>g) return z-g;
if(z<-g) return z+g;
return 0;
}

function lassoFit(x,y,lambda=1,iters=100){
let b0=mean(y);
let b1=0;
for(let k=0;k<iters;k++){
let residual=[];
for(let i=0;i<x.length;i++){
residual.push(y[i]-b0-b1*x[i]);
}
let rho=0;
let norm=0;
for(let i=0;i<x.length;i++){
rho+=x[i]*(y[i]-b0);
norm+=x[i]*x[i];
}
b1=softThreshold(rho,lambda)/norm;
b0=mean(y)-b1*mean(x);
}
let pred=x.map(v=>b0+b1*v);
return{
intercept:b0,
slope:b1,
pred,
r2:r2(y,pred)
};
}

function plotC1(){
drawPlot(
"graph1",
c1y.value,
"stats1"
);
}

function plotC2(){
drawPlot(
"graph2",
c2y.value,
"stats2"
);
}

function drawPlot(div,yField,statsDiv){
if(fullData.length<3){
alert("Load data first");
return;
}

let y=numericSeries(yField);
let x=seq(y.length);

let ridge=ridgeFit(x,y);
let lasso=lassoFit(x,y);

let mode=analysisMode.value;
let traces=[];

if(mode=="raw"||mode=="all"){
traces.push({
x,y,
mode:"lines",
name:"Actual"
});
}

if(mode=="ridge"||mode=="all"){
traces.push({
x,
y:ridge.pred,
mode:"lines",
name:"Ridge Fit"
});
}

if(mode=="lasso"||mode=="all"){
traces.push({
x,
y:lasso.pred,
mode:"lines",
name:"Lasso Fit"
});
}

Plotly.newPlot(
div,
traces,
{
title:yField+" Trend + Regression",
template:"plotly_dark",
xaxis:{title:"Sample Index"},
yaxis:{title:yField},
hovermode:"x unified"
}
);

document.getElementById(statsDiv).innerHTML=
"<span class='badge'>RIDGE</span><br>"+
"Intercept = "+ridge.intercept.toFixed(4)+"<br>"+
"Slope = "+ridge.slope.toFixed(4)+"<br>"+
"R² = "+ridge.r2.toFixed(4)+
"<br><br>"+
"<span class='badge'>LASSO</span><br>"+
"Intercept = "+lasso.intercept.toFixed(4)+"<br>"+
"Slope = "+lasso.slope.toFixed(4)+"<br>"+
"R² = "+lasso.r2.toFixed(4);
}

window.onload=async()=>{
await loadSheetData();
};

</script>
</body>
</html>
