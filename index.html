<!DOCTYPE html>
<html>
<head>
  <title>SCADA Dashboard</title>
  <style>
    body { margin:0; font-family:Segoe UI; background:#0b1220; color:white; }
    .container { display:flex; }

    .sidebar {
      width:250px;
      background:#111827;
      padding:15px;
      height:100vh;
    }

    .main { flex:1; padding:20px; }

    .section {
      margin-bottom:30px;
      background:#1e293b;
      padding:15px;
      border-radius:10px;
    }

    .grid {
      display:grid;
      grid-template-columns: repeat(4,1fr);
      gap:10px;
    }

    .card {
      background:#020617;
      padding:10px;
      border-radius:6px;
      text-align:center;
      font-size:13px;
    }

    .status {
      margin-top:10px;
      padding:8px;
      border-radius:6px;
      font-weight:bold;
    }

    .green { background:#065f46; }
    .red { background:#7f1d1d; }
    .yellow { background:#78350f; }

    input, button {
      width:100%;
      margin:10px 0;
      padding:8px;
      border-radius:5px;
      border:none;
    }

    button {
      background:#2563eb;
      color:white;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h3>📅 Select Date</h3>
<input type="date" id="datePicker">

<hr>

<button onclick="openGraphPage()">📊 Open Graph Panel</button>
</div>

<div class="main">

<h1>⚙️ SCADA Dashboard</h1>
<p id="time"></p>

<div class="section">
<h2>C-Tech 1</h2>
<div class="grid" id="c1_grid"></div>
<div id="c1_status" class="status"></div>
</div>

<div class="section">
<h2>C-Tech 2</h2>
<div class="grid" id="c2_grid"></div>
<div id="c2_status" class="status"></div>
</div>

</div>
</div>

<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbw5UXnwLXehPLf8ots1zp4aYrkIFYOlM1SMddbzUUjrzviynH4ogyKL0RdeRhd7SBZ3/exec";

let lastValidData = null;

function getStatusColor(text){
  if(!text) return "yellow";
  if(text.includes("RUN") || text.includes("HEALTHY")) return "green";
  if(text.includes("DOWN") || text.includes("FAULT")) return "red";
  return "yellow";
}

// ✅ Force YYYY-MM-DD format safely
function getFormattedDate(){
  let input = document.getElementById("datePicker").value;

  if(!input) return "";

  // input already in YYYY-MM-DD → just return
  return input;
}

async function fetchData(){

  let selectedDate = getFormattedDate();  // ✅ ALWAYS YYYY-MM-DD

  try {

    let url = BASE_URL;
    if(selectedDate){
      url += "?date=" + selectedDate;
    }

    let res = await fetch(url);
    let data = await res.json();

    // 🔥 If no data → fallback to latest
    if(!data || data.length === 0){

      let res2 = await fetch(BASE_URL);
      let data2 = await res2.json();

      if(!data2 || data2.length === 0){
        if(lastValidData) updateUI(lastValidData, true);
        return;
      }

      let last = data2[data2.length - 1];
      lastValidData = last;

      updateUI(last, true);
      return;
    }

    let last = data[data.length - 1];
    lastValidData = last;

    updateUI(last, false);

  } catch(e){
    console.log("Error:", e);
    if(lastValidData) updateUI(lastValidData, true);
  }
}

function updateUI(d, stale){

  function render(prefix, gridId){
    let grid = document.getElementById(gridId);
    grid.innerHTML = "";

    Object.keys(d).forEach(k=>{
      if(k.startsWith(prefix)){
        grid.innerHTML += `<div class="card">${k}<br>${d[k] ?? "--"}</div>`;
      }
    });
  }

  render("C1_", "c1_grid");
  render("C2_", "c2_grid");

  c1_status.innerText = d["C1_DecPos"] || "--";
  c2_status.innerText = d["C2_DecPos"] || "--";

  c1_status.className = "status " + getStatusColor(d["C1_DecPos"]);
  c2_status.className = "status " + getStatusColor(d["C2_DecPos"]);

  let dataTime = d["Timestamp"] || d["Time"] || d["Date"] || "No Timestamp";

  document.getElementById("time").innerText =
    "Data Time: " + dataTime + (stale ? " ⚠️ LAST AVAILABLE DATA" : "");
}

function openGraphPage(){
  let date = getFormattedDate(); // ✅ ALWAYS correct format
  window.open("graph.html?date=" + date, "_blank");
}

// ✅ Set default date in YYYY-MM-DD correctly
function setTodayDate(){
  let today = new Date();

  let yyyy = today.getFullYear();
  let mm = String(today.getMonth() + 1).padStart(2, '0');
  let dd = String(today.getDate()).padStart(2, '0');

  document.getElementById("datePicker").value = `${yyyy}-${mm}-${dd}`;
}

setTodayDate();

document.getElementById("datePicker").addEventListener("change", fetchData);

fetchData();
setInterval(fetchData, 60000);

</script>
</body>
</html>
