<!DOCTYPE html>
<html>
<head>
  <title>SCADA Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI";
      background: #0b1220;
      color: white;
    }

    header {
      padding: 15px;
      background: #111a2e;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    input {
      padding: 6px;
      font-size: 14px;
    }

    .container {
      display: flex;
      flex-direction: column;
      padding: 15px;
      gap: 20px;
    }

    .basin {
      background: #111a2e;
      padding: 15px;
      border-radius: 10px;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
      font-weight: bold;
      color: #4fc3f7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .card {
      background: #0b1220;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      border: 1px solid #1e2a47;
    }

    .label {
      font-size: 12px;
      color: #aaa;
    }

    .value {
      font-size: 18px;
      font-weight: bold;
      margin-top: 5px;
    }

    .status {
      color: #00e676;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h2>SCADA Dashboard</h2>
  <div>
    Select Date:
    <input type="date" id="datePicker">
  </div>
</header>

<div class="container">

  <!-- Basin 1 -->
  <div class="basin">
    <div class="title">C-Tech Basin 1</div>
    <div class="grid" id="basin1"></div>
  </div>

  <!-- Basin 2 -->
  <div class="basin">
    <div class="title">C-Tech Basin 2</div>
    <div class="grid" id="basin2"></div>
  </div>

  <div id="error" class="error"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbw5UXnwLXehPLf8ots1zp4aYrkIFYOlM1SMddbzUUjrzviynH4ogyKL0RdeRhd7SBZ3/exec"; // ⚠️ IMPORTANT

// ---------- PARAMETERS ----------
const basin1Params = [
  "C1_Level","C1_Inflow","C1_DecPos","C1_CycleStat",
  "C1_CycleTot","C1_CycleRem","C1_SetRPM","C1_ActRPM",
  "C1_Current_A","C1_Power_kW","C1_Torque_Nm","C1_Freq_Hz"
];

const basin2Params = [
  "C2_Level","C2_Inflow","C2_DecPos","C2_CycleStat",
  "C2_CycleTot","C2_CycleRem","C2_SetRPM","C2_ActRPM",
  "C2_Current_A","C2_Power_kW","C2_Torque_Nm","C2_Freq_Hz"
];

// ---------- INIT ----------
function createCards(containerId, params) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  params.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="label">${p}</div>
      <div class="value" id="${p}">--</div>
    `;
    container.appendChild(card);
  });
}

// ---------- UPDATE UI ----------
function updateUI(data) {
  document.getElementById("error").innerText = "";

  basin1Params.forEach(p => {
    document.getElementById(p).innerText = data[p] ?? "--";
  });

  basin2Params.forEach(p => {
    document.getElementById(p).innerText = data[p] ?? "--";
  });
}

// ---------- FETCH ----------
async function fetchData() {
  const date = document.getElementById("datePicker").value;

  let url = API_URL;
  if (date) {
    url += "?date=" + date;
  }

  try {
    const res = await fetch(url);
    const json = await res.json();

    if (!json.success) {
      document.getElementById("error").innerText = json.message;
      return;
    }

    updateUI(json.lastData);

  } catch (err) {
    document.getElementById("error").innerText = "Connection Error";
  }
}

// ---------- AUTO REFRESH ----------
setInterval(fetchData, 2000);

// ---------- INIT LOAD ----------
window.onload = () => {

  // Set today's date default
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("datePicker").value = today;

  createCards("basin1", basin1Params);
  createCards("basin2", basin2Params);

  fetchData();
};

</script>

</body>
</html>
