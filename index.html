<script>

const BASE_URL = "https://script.google.com/macros/s/AKfycbw5UXnwLXehPLf8ots1zp4aYrkIFYOlM1SMddbzUUjrzviynH4ogyKL0RdeRhd7SBZ3/exec";

let lastValidData = null;

// 🚨 NO FORMAT CHANGE NOW
function getSelectedDate(){
  return document.getElementById("datePicker").value;
}

function getStatusColor(text){
  if(!text) return "yellow";
  if(text.includes("RUN") || text.includes("HEALTHY")) return "green";
  if(text.includes("DOWN") || text.includes("FAULT")) return "red";
  return "yellow";
}

async function fetchData(){

  let selectedDate = getSelectedDate();

  try {

    // 🔹 TRY SELECTED DATE FIRST
    let res = await fetch(BASE_URL + "?date=" + selectedDate);
    let data = await res.json();

    // 🚨 IF NO DATA → GET LATEST
    if(!data || data.length === 0){

      console.warn("No data for selected date → loading latest");

      let res2 = await fetch(BASE_URL); // no date
      let data2 = await res2.json();

      if(!data2 || data2.length === 0){
        if(lastValidData){
          updateUI(lastValidData, true);
        }
        return;
      }

      let last = data2[data2.length - 1];
      lastValidData = last;

      updateUI(last, true);
      return;
    }

    // 🔥 NORMAL CASE
    let last = data[data.length - 1];

    lastValidData = last;

    updateUI(last, false);

  } catch(e){

    console.error("Fetch failed");

    if(lastValidData){
      updateUI(lastValidData, true);
    }
  }
}

function updateUI(d, stale){

  function addCards(prefix, gridId){
    let grid = document.getElementById(gridId);
    grid.innerHTML = "";

    Object.keys(d).forEach(k=>{
      if(k.startsWith(prefix)){
        grid.innerHTML += `<div class="card">${k}<br>${d[k] ?? "--"}</div>`;
      }
    });
  }

  addCards("C1_", "c1_grid");
  addCards("C2_", "c2_grid");

  c1_status.innerText = d["C1_DecPos"] || "--";
  c2_status.innerText = d["C2_DecPos"] || "--";

  c1_status.className = "status " + getStatusColor(d["C1_DecPos"]);
  c2_status.className = "status " + getStatusColor(d["C2_DecPos"]);

  // 🔥 ACTUAL DATA TIME
  let dataTime = d["Timestamp"] || d["Date"] || d["Time"] || "No Timestamp";

  document.getElementById("time").innerText =
    "Data Time: " + dataTime + (stale ? " ⚠️ USING LAST AVAILABLE DATA" : "");
}

function openGraphPage(){
  let date = document.getElementById("datePicker").value;
  window.open("graph.html?date=" + date, "_blank");
}

// DEFAULT TODAY
document.getElementById("datePicker").valueAsDate = new Date();

document.getElementById("datePicker").addEventListener("change", fetchData);

fetchData();
setInterval(fetchData, 60000);

</script>
